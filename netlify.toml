[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redireciona /app para app.html
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

# Redireciona /privacy para privacy.html
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# Redireciona /terms para terms.html
[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=*, microphone=*"

[[headers]]
  for = "/app.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com https://api.anthropic.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
